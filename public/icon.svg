<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#030712" />
    </radialGradient>

    <!-- Stator Core Ring Gradient -->
    <linearGradient id="statorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#374151" />
      <stop offset="50%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Glowing Gold Needle Gradient -->
    <linearGradient id="needleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Glow Filter for central flux -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <stop offset="0%" stop-color="#f59e0b" />
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Glow for Phase Colors -->
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular Outer Background -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#1f2937" stroke-width="8" />

  <!-- Outer Stator Core Outer Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#statorGrad)" stroke-width="20" />
  <circle cx="256" cy="256" r="190" fill="none" stroke="#111827" stroke-width="4" />

  <!-- Stator Core Slots (Inner teeth guidelines) -->
  <g stroke="#374151" stroke-width="3" opacity="0.4">
    <line x1="256" y1="46" x2="256" y2="466" />
    <line x1="46" y1="256" x2="466" y2="256" />
    <line x1="107" y1="107" x2="405" y2="405" />
    <line x1="107" y1="405" x2="405" y2="107" />
  </g>

  <!-- Magnetic Flux Circular Field Lines -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.25" />
  <circle cx="256" cy="256" r="75" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.15" />

  <!-- Phase Windings (Represented as beautifully colored coils/dots around the stator) -->
  <!-- We'll place 12 coils representing a standard 3-phase winding -->
  <!-- Phase A: Red (#ef4444), Phase B: Green (#10b981), Phase C: Blue (#0ea5e9) -->
  <g>
    <!-- Slot 1 (30 deg) - Phase A (+) -->
    <circle cx="341" cy="108" r="14" fill="#ef4444" stroke="#fca5a5" stroke-width="2.5" filter="url(#glow-red)" />
    <text x="341" y="112" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">A+</text>

    <!-- Slot 2 (60 deg) - Phase C (-) -->
    <circle cx="390" cy="157" r="14" fill="#0ea5e9" stroke="#7dd3fc" stroke-width="2.5" />
    <text x="390" y="161" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">C-</text>

    <!-- Slot 3 (90 deg) - Phase B (+) -->
    <circle cx="406" cy="256" r="14" fill="#10b981" stroke="#6ee7b7" stroke-width="2.5" />
    <text x="406" y="260" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">B+</text>

    <!-- Slot 4 (120 deg) - Phase A (-) -->
    <circle cx="390" cy="355" r="14" fill="#ef4444" stroke="#fca5a5" stroke-width="2.5" />
    <text x="390" y="359" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">A-</text>

    <!-- Slot 5 (150 deg) - Phase C (+) -->
    <circle cx="341" cy="404" r="14" fill="#0ea5e9" stroke="#7dd3fc" stroke-width="2.5" />
    <text x="341" y="408" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">C+</text>

    <!-- Slot 6 (180 deg) - Phase B (-) -->
    <circle cx="256" cy="421" r="14" fill="#10b981" stroke="#6ee7b7" stroke-width="2.5" />
    <text x="256" y="425" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">B-</text>

    <!-- Slot 7 (210 deg) - Phase A (+) -->
    <circle cx="171" cy="404" r="14" fill="#ef4444" stroke="#fca5a5" stroke-width="2.5" />
    <text x="171" y="408" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">A+</text>

    <!-- Slot 8 (240 deg) - Phase C (-) -->
    <circle cx="122" cy="355" r="14" fill="#0ea5e9" stroke="#7dd3fc" stroke-width="2.5" />
    <text x="122" y="359" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">C-</text>

    <!-- Slot 9 (270 deg) - Phase B (+) -->
    <circle cx="106" cy="256" r="14" fill="#10b981" stroke="#6ee7b7" stroke-width="2.5" />
    <text x="106" y="260" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">B+</text>

    <!-- Slot 10 (300 deg) - Phase A (-) -->
    <circle cx="122" cy="157" r="14" fill="#ef4444" stroke="#fca5a5" stroke-width="2.5" />
    <text x="122" y="161" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">A-</text>

    <!-- Slot 11 (330 deg) - Phase C (+) -->
    <circle cx="171" cy="108" r="14" fill="#0ea5e9" stroke="#7dd3fc" stroke-width="2.5" />
    <text x="171" y="112" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">C+</text>

    <!-- Slot 12 (360 deg) - Phase B (-) -->
    <circle cx="256" cy="91" r="14" fill="#10b981" stroke="#6ee7b7" stroke-width="2.5" />
    <text x="256" y="95" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">B-</text>
  </g>

  <!-- Rotor Shaft Ring in the center -->
  <circle cx="256" cy="256" r="45" fill="#1f2937" stroke="#374151" stroke-width="4" />
  <circle cx="256" cy="256" r="22" fill="#111827" />

  <!-- Glowing Golden Magnetic Flux Directional Arrow (Needle) representing rotating field -->
  <g transform="rotate(35, 256, 256)" filter="url(#glow)">
    <!-- Rotating arrow shaft -->
    <line x1="256" y1="256" x2="256" y2="120" stroke="url(#needleGrad)" stroke-width="12" stroke-linecap="round" />
    <!-- Arrowhead -->
    <polygon points="256,90 236,130 276,130" fill="url(#needleGrad)" />
    <!-- Balanced Counterweight -->
    <circle cx="256" cy="256" r="12" fill="#f59e0b" />
    <line x1="256" y1="256" x2="256" y2="300" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" />
    <circle cx="256" cy="300" r="10" fill="#f59e0b" />
  </g>

  <!-- Inner Air Gap Ring -->
  <circle cx="256" cy="256" r="135" fill="none" stroke="#1f2937" stroke-dasharray="4,6" stroke-width="1" opacity="0.3" />
</svg>
